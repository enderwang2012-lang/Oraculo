name: Oraculo
options:
  bundleIdPrefix: ai.oraculo
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: true
settings:
  base:
    SWIFT_VERSION: "5.9"
    TARGETED_DEVICE_FAMILY: "1,2"
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
targets:
  Oraculo:
    type: application
    platform: iOS
    sources:
      - path: Oraculo
      - path: Shared
        excludes:
          - "**/Resources/**"
      - path: Shared/Resources/phrases.json
        buildPhase: resources
      - path: Shared/Resources/corpus_bundled_meta.json
        buildPhase: resources
      - path: Shared/Resources/nippon_colors.json
        buildPhase: resources
      - path: Shared/Resources/festivals_cn.json
        buildPhase: resources
      - path: Shared/Resources/solar_terms_cn.json
        buildPhase: resources
    resources:
      - path: Oraculo/Assets.xcassets
    entitlements:
      path: Oraculo/Oraculo.entitlements
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: ai.oraculo.app
        INFOPLIST_KEY_CFBundleDisplayName: Oraculo
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations: UIInterfaceOrientationPortrait
        INFOPLIST_KEY_NSLocationWhenInUseUsageDescription: "用于根据你所在的位置、海拔与节气，推荐更契合的一句。"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
    dependencies:
      - target: OraculoWidget
        embed: true

  OraculoWidget:
    type: app-extension
    platform: iOS
    sources:
      - path: OraculoWidget
        excludes:
          - Info.plist
      - path: Shared
        excludes:
          - "**/Resources/**"
      - path: Shared/Resources/phrases.json
        buildPhase: resources
      - path: Shared/Resources/corpus_bundled_meta.json
        buildPhase: resources
      - path: Shared/Resources/nippon_colors.json
        buildPhase: resources
      - path: Shared/Resources/festivals_cn.json
        buildPhase: resources
      - path: Shared/Resources/solar_terms_cn.json
        buildPhase: resources
    entitlements:
      path: OraculoWidget/OraculoWidget.entitlements
    info:
      path: OraculoWidget/Info.plist
      properties:
        CFBundleDisplayName: Oraculo Widget
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: ai.oraculo.app.OraculoWidget
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: OraculoWidget/Info.plist
        APPLICATION_EXTENSION_API_ONLY: YES
        SKIP_INSTALL: YES

schemes:
  Oraculo:
    build:
      targets:
        Oraculo: all
        OraculoWidget: all
    run:
      config: Debug
    test:
      config: Debug
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
